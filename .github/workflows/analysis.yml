name: CBox 代码分析

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
          submodules: recursive

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: 安装依赖
        run: flutter pub get

      - name: 代码静态分析
        run: flutter analyze lib test

      - name: 运行测试
        run: flutter test