name: Flutter Build

on:
  workflow_dispatch:
    inputs:
      release:
        description: 'Create GitHub Release (auto tag v1.0.<commit_count>)'
        required: false
        type: boolean
        default: false
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: ServerBox
  BUILD_TAG: test-build-${{ github.run_number }}-${{ github.sha }}

jobs:
  buildAndroid:
    name: Build android
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "stable"
          flutter-version: "3.44.1"
      - uses: actions/setup-java@v4
        with:
          distribution: "zulu"
          java-version: "21"
      - name: Prepare signing key
        env:
          KEYSTORE_B64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
          STORE_PASSWORD: ${{ secrets.KEY_STORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_ALIAS_PASSWORD }}
        run: |
          echo "$KEYSTORE_B64" | base64 -d > android/app/release.keystore
          cat > android/key.properties <<EOF
          storeFile=release.keystore
          storePassword=$STORE_PASSWORD
          keyAlias=serverbox
          keyPassword=$KEY_PASSWORD
          EOF
      - name: Patch JNI build-id
        run: |
          flutter pub get
          scripts/release/patch-jni-build-id.sh
      - name: Build (release)
        if: inputs.release == true || github.ref_type == 'tag'
        shell: bash
        run: dart run fl_build -bp -p android
      - name: Build (test)
        if: inputs.release != true && github.ref_type != 'tag'
        shell: bash
        run: dart run fl_build -p android
      - name: Rename
        shell: bash
        run: |
          cd build/app/outputs/flutter-apk
          for f in *_${BUILD_NUMBER}_*.apk; do
            mv "$f" "${f/_${BUILD_NUMBER}_/_v1.0.${BUILD_NUMBER}_}"
          done
          # Remove original APKs copied by fl_build
          rm -f app-*-release.apk
      - name: Upload artifacts
        if: inputs.release != true && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_TAG }}-android
          path: build/app/outputs/flutter-apk/*.apk
          if-no-files-found: error
          retention-days: 14
      - name: Create Release
        if: inputs.release == true || github.ref_type == 'tag'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ env.BUILD_NUMBER }}
          files: |
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_arm64.apk
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_arm.apk
            build/app/outputs/flutter-apk/${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_amd64.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  buildLinux:
    name: Build linux
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs_on: ubuntu-latest
            release_suffix: ""
            artifact_suffix: ""
          - runs_on: ubuntu-22.04
            release_suffix: "_legacy"
            artifact_suffix: "-legacy"
    runs-on: ${{ matrix.runs_on }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: "3.44.1"
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y clang cmake ninja-build pkg-config libgtk-3-dev mesa-utils libvulkan-dev desktop-file-utils wget
          sudo apt install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev libunwind-dev libsecret-1-dev
      - name: Build (release)
        if: inputs.release == true || github.ref_type == 'tag'
        shell: bash
        run: dart run fl_build -bp -p linux
      - name: Build (test)
        if: inputs.release != true && github.ref_type != 'tag'
        shell: bash
        run: dart run fl_build -p linux
      - name: Rename
        shell: bash
        run: |
          for f in *_${BUILD_NUMBER}_*.AppImage; do
            mv "$f" "${f/_${BUILD_NUMBER}_/_v1.0.${BUILD_NUMBER}_}"
          done
      - name: Add legacy suffix
        if: matrix.release_suffix != ''
        shell: bash
        run: |
          mv "${APP_NAME}_v1.0.${BUILD_NUMBER}_amd64.AppImage" "${APP_NAME}_v1.0.${BUILD_NUMBER}${{ matrix.release_suffix }}_amd64.AppImage"
      - name: Package .deb (银河麒麟 v10 兼容)
        shell: bash
        run: |
          # 从 build 目录获取 linux bundle 路径
          BUNDLE_DIR="build/linux/x64/release/bundle"
          if [ ! -d "$BUNDLE_DIR" ] && [ -d "build/linux/x64/release" ]; then
            BUNDLE_DIR=$(find build/linux/x64/release -name "bundle" -type d | head -1)
          fi

          if [ -d "$BUNDLE_DIR" ]; then
            DEB_NAME="${APP_NAME}_v1.0.${BUILD_NUMBER}${{ matrix.release_suffix }}_amd64"
            DEB_DIR="deb-pkg/${DEB_NAME}"

            mkdir -p "${DEB_DIR}/DEBIAN"
            mkdir -p "${DEB_DIR}/usr/bin"
            mkdir -p "${DEB_DIR}/usr/share/applications"
            mkdir -p "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps"
            mkdir -p "${DEB_DIR}/opt/${APP_NAME}"

            # 复制 bundle 文件
            cp -r "${BUNDLE_DIR}"/* "${DEB_DIR}/opt/${APP_NAME}/"

            # 创建符号链接
            ln -sf "/opt/${APP_NAME}/${APP_NAME}" "${DEB_DIR}/usr/bin/${APP_NAME,,}"

            # 创建 .desktop 文件
            DESKTOP_FILE="${DEB_DIR}/usr/share/applications/${APP_NAME,,}.desktop"
            echo "[Desktop Entry]" > "$DESKTOP_FILE"
            echo "Name=${APP_NAME}" >> "$DESKTOP_FILE"
            echo "Comment=Server status & toolbox app" >> "$DESKTOP_FILE"
            echo "Exec=${APP_NAME,,}" >> "$DESKTOP_FILE"
            echo "Icon=${APP_NAME,,}" >> "$DESKTOP_FILE"
            echo "Terminal=false" >> "$DESKTOP_FILE"
            echo "Type=Application" >> "$DESKTOP_FILE"
            echo "Categories=Utility;Network;" >> "$DESKTOP_FILE"
            echo "StartupWMClass=${APP_NAME}" >> "$DESKTOP_FILE"

            # 查找或创建图标
            ICON_SRC=""
            for icon_path in "assets/icon/icon.png" "assets/icon.png" "assets/logo.png"; do
              if [ -f "$icon_path" ]; then
                ICON_SRC="$icon_path"
                break
              fi
            done
            if [ -n "$ICON_SRC" ]; then
              cp "$ICON_SRC" "${DEB_DIR}/usr/share/icons/hicolor/256x256/apps/${APP_NAME,,}.png"
            fi

            # 创建 control 文件
            CTRL_FILE="${DEB_DIR}/DEBIAN/control"
            echo "Package: ${APP_NAME,,}" > "$CTRL_FILE"
            echo "Version: 1.0.${BUILD_NUMBER}" >> "$CTRL_FILE"
            echo "Section: net" >> "$CTRL_FILE"
            echo "Priority: optional" >> "$CTRL_FILE"
            echo "Architecture: amd64" >> "$CTRL_FILE"
            echo "Depends: libgtk-3-0, libsecret-1-0, libgstreamer1.0-0, libgstreamer-plugins-base1.0-0" >> "$CTRL_FILE"
            echo "Maintainer: onepve <sync@onepve.com>" >> "$CTRL_FILE"
            echo "Description: Server status & toolbox app" >> "$CTRL_FILE"
            echo " A Flutter-based application for monitoring and managing Linux servers." >> "$CTRL_FILE"
            echo " Supports SSH terminal, Docker management, systemd services, and more." >> "$CTRL_FILE"
            echo "Homepage: https://github.com/onepve/flutter_server_box" >> "$CTRL_FILE"

            # 设置权限
            chmod 755 "${DEB_DIR}/DEBIAN"
            chmod 755 "${DEB_DIR}/DEBIAN/control" 2>/dev/null || true
            find "${DEB_DIR}/opt" -type f -exec chmod 755 {} \;
            find "${DEB_DIR}/usr" -type f -exec chmod 755 {} \;

            # 打包 .deb
            dpkg-deb --build "${DEB_DIR}" "${DEB_NAME}.deb"
            ls -la "${DEB_NAME}.deb"
            echo "✅ .deb 打包完成: ${DEB_NAME}.deb"
          else
            echo "⚠️ 未找到 Linux bundle 目录，跳过 .deb 打包"
          fi
      - name: Upload artifacts
        if: inputs.release != true && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_TAG }}-linux${{ matrix.artifact_suffix }}
          path: |
            *.AppImage
            *.deb
          if-no-files-found: error
          retention-days: 14
      - name: Create Release
        if: inputs.release == true || github.ref_type == 'tag'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ env.BUILD_NUMBER }}
          files: |
            ${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}${{ matrix.release_suffix }}_amd64.AppImage
            ${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}${{ matrix.release_suffix }}_amd64.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  buildWindows:
    name: Build windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          persist-credentials: false
          fetch-depth: 0
      - name: Install Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          flutter-version: "3.44.1"
      - name: Build (release)
        if: inputs.release == true || github.ref_type == 'tag'
        shell: bash
        run: dart run fl_build -bp -p windows
      - name: Build (test)
        if: inputs.release != true && github.ref_type != 'tag'
        shell: bash
        run: dart run fl_build -p windows
      - name: Rename
        shell: bash
        run: |
          for f in *_${BUILD_NUMBER}_*.zip; do
            mv "$f" "${f/_${BUILD_NUMBER}_/_v1.0.${BUILD_NUMBER}_}"
          done
      - name: Upload artifacts
        if: inputs.release != true && github.ref_type != 'tag'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-${{ env.BUILD_TAG }}-windows
          path: "*_windows_amd64.zip"
          if-no-files-found: error
          retention-days: 14
      - name: Create Release
        if: inputs.release == true || github.ref_type == 'tag'
        continue-on-error: true
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ env.BUILD_NUMBER }}
          files: |
            ${{ env.APP_NAME }}_v1.0.${{ env.BUILD_NUMBER }}_windows_amd64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
